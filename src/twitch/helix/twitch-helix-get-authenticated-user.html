<script type="text/javascript">
  RED.nodes.registerType('twitch-helix-get-authenticated-user', {
    category: 'twitch api',
    color: '#b9a3e3',
    defaults: {
      name:      { value: '' },
      config:    { type: 'twitch-api-config', required: true },
      userId:    { value: '' },
      withEmail: { value: false },
    },
    inputs: 1,
    outputs: 1,
    icon: 'twitch-icon.png',
    paletteLabel: 'get auth user',
    label: function () {
      if (this.name) return this.name;
      const config = RED.nodes.node(this.config);
      return 'get auth user' + (config ? ' (' + (config.name || '') + ')' : '');
    },
    labelStyle: function () { return this.name ? 'node_label_italic' : ''; },
  });
</script>

<script type="text/html" data-template-name="twitch-helix-get-authenticated-user">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config" />
  </div>
  <div class="form-row">
    <label for="node-input-userId"><i class="fa fa-hashtag"></i> User ID</label>
    <input type="text" id="node-input-userId" placeholder="Authenticated user ID" />
  </div>
  <div class="form-row">
    <label for="node-input-withEmail"><i class="fa fa-envelope"></i> Include Email</label>
    <input type="checkbox" id="node-input-withEmail" style="width:auto;" />
  </div>
</script>

<script type="text/html" data-help-name="twitch-helix-get-authenticated-user">
  <p>Gets the full profile of an authenticated Twitch user, optionally including their email address.</p>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload.userId <span class="property-type">string</span></dt>
    <dd>The authenticated user's ID.</dd>
    <dt>payload.withEmail <span class="property-type">boolean</span></dt>
    <dd>Optional. Set to <code>true</code> to include the email address. Requires the <code>user:read:email</code> scope.</dd>
  </dl>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>User object with <code>id</code>, <code>name</code>, <code>displayName</code>, <code>email</code>, <code>profilePictureUrl</code>, <code>description</code>, <code>broadcasterType</code>, and <code>creationDate</code>.</dd>
  </dl>
</script>
