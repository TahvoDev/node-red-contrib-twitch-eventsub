<script type="text/javascript">
  RED.nodes.registerType('twitch-helix-user-block', {
    category: 'twitch api',
    color: '#b9a3e3',
    defaults: {
      name:          { value: '' },
      config:        { type: 'twitch-api-config', required: true },
      action:        { value: 'block' },
      broadcasterId: { value: '' },
      targetId:      { value: '' },
      reason:        { value: '' },
      sourceContext: { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'twitch-icon.png',
    paletteLabel: 'block user',
    label: function () {
      if (this.name) return this.name;
      const config = RED.nodes.node(this.config);
      return 'block user' + (config ? ' (' + (config.name || '') + ')' : '');
    },
    labelStyle: function () { return this.name ? 'node_label_italic' : ''; },
  });
</script>

<script type="text/html" data-template-name="twitch-helix-user-block">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config" />
  </div>
  <div class="form-row">
    <label for="node-input-action"><i class="fa fa-toggle-on"></i> Action</label>
    <select id="node-input-action">
      <option value="block">Block</option>
      <option value="unblock">Unblock</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-broadcasterId"><i class="fa fa-hashtag"></i> Broadcaster ID</label>
    <input type="text" id="node-input-broadcasterId" placeholder="Broadcaster user ID" />
  </div>
  <div class="form-row">
    <label for="node-input-targetId"><i class="fa fa-user"></i> Target ID</label>
    <input type="text" id="node-input-targetId" placeholder="User ID to block/unblock" />
  </div>
  <div class="form-row">
    <label for="node-input-reason"><i class="fa fa-comment"></i> Reason</label>
    <select id="node-input-reason">
      <option value="">— none —</option>
      <option value="spam">Spam</option>
      <option value="harassment">Harassment</option>
      <option value="other">Other</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-sourceContext"><i class="fa fa-comment"></i> Source</label>
    <select id="node-input-sourceContext">
      <option value="">— none —</option>
      <option value="chat">Chat</option>
      <option value="whisper">Whisper</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="twitch-helix-user-block">
  <p>Blocks or unblocks a Twitch user on behalf of a broadcaster.</p>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload.action <span class="property-type">string</span></dt>
    <dd><code>block</code> (default) or <code>unblock</code>.</dd>
    <dt>payload.broadcasterId <span class="property-type">string</span></dt>
    <dd>The user adding or removing the block.</dd>
    <dt>payload.targetId <span class="property-type">string</span></dt>
    <dd>The user to block or unblock.</dd>
    <dt>payload.reason <span class="property-type">string</span></dt>
    <dd>Optional. <code>spam</code>, <code>harassment</code>, or <code>other</code>. Block only.</dd>
    <dt>payload.sourceContext <span class="property-type">string</span></dt>
    <dd>Optional. <code>chat</code> or <code>whisper</code>. Block only.</dd>
  </dl>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>Contains <code>action</code>, <code>broadcasterId</code>, and <code>targetId</code> confirming the operation.</dd>
  </dl>

  <h3>Details</h3>
  <p>Node config values are used as defaults when not provided in <code>msg.payload</code>.</p>
</script>
