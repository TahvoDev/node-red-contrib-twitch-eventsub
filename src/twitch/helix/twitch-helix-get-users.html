<script type="text/javascript">
  RED.nodes.registerType('twitch-helix-get-users', {
    category: 'twitch api',
    color: '#b9a3e3',
    defaults: {
      name:    { value: '' },
      config:  { type: 'twitch-api-config', required: true },
      userIds: { value: '' },
      logins:  { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'twitch-icon.svg',
    paletteLabel: 'get users',
    label: function () {
      if (this.name) return this.name;
      const config = RED.nodes.node(this.config);
      return 'get users' + (config ? ' (' + (config.name || '') + ')' : '');
    },
    labelStyle: function () {
      return this.name ? 'node_label_italic' : '';
    },
  });
</script>

<script type="text/html" data-template-name="twitch-helix-get-users">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config" />
  </div>
  <div class="form-row">
    <label for="node-input-userIds"><i class="fa fa-hashtag"></i> User IDs</label>
    <input type="text" id="node-input-userIds" placeholder="e.g. 44322889, 123456" />
  </div>
  <div class="form-row">
    <label for="node-input-logins"><i class="fa fa-user"></i> Usernames</label>
    <input type="text" id="node-input-logins" placeholder="e.g. shroud, ludwig" />
  </div>
</script>

<script type="text/html" data-help-name="twitch-helix-get-users">
  <p>Looks up Twitch profiles using explicit fields for IDs and Usernames. If both inputs are used simultaneously, the node merges and de-duplicates the results automatically.</p>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>userId | userIds <span class="property-type">string | array</span></dt>
    <dd>Optional. One or more numeric Twitch user IDs (comma-separated or string array).</dd>

    <dt>login | logins <span class="property-type">string | array</span></dt>
    <dd>Optional. One or more Twitch usernames (comma-separated or string array). Handles completely numeric usernames safely.</dd>
  </dl>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object | array</span></dt>
    <dd>
      Returns a single user profile object if exactly one unique account matches across your criteria. Returns a combined array of profile objects if multiple distinct targets are returned.
    </dd>
  </dl>
</script>
