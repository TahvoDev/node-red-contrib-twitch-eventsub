<script type="text/javascript">
  RED.nodes.registerType('twitch-helix-update-user-description', {
    category: 'twitch api',
    color: '#b9a3e3',
    defaults: {
      name:        { value: '' },
      config:      { type: 'twitch-api-config', required: true },
      description: { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'twitch-icon.svg',
    paletteLabel: 'update bio',
    label: function () {
      if (this.name) return this.name;
      const config = RED.nodes.node(this.config);
      return 'update bio' + (config ? ' (' + (config.name || '') + ')' : '');
    },
    labelStyle: function () { return this.name ? 'node_label_italic' : ''; },
  });
</script>

<script type="text/html" data-template-name="twitch-helix-update-user-description">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config" />
  </div>
  <div class="form-row">
    <label for="node-input-description"><i class="fa fa-info-circle"></i> Description</label>
    <input type="text" id="node-input-description" placeholder="Optional default description" />
  </div>
</script>

<script type="text/html" data-help-name="twitch-helix-update-user-description">
  <p>Updates the channel description of the authenticated Twitch user.</p>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string | object</span></dt>
    <dd>The new description as a string, or an object containing a <code>description</code> key.</dd>
  </dl>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>Updated user object containing <code>id</code>, <code>name</code>, <code>displayName</code>, <code>description</code>, <code>broadcasterType</code>, and <code>creationDate</code>.</dd>
  </dl>

  <h3>Details</h3>
  <p>Requires the <code>user:edit</code> scope. If no payload is provided, the node uses the default description configured in the node properties.</p>
</script>
