<script type="text/javascript">
  RED.nodes.registerType('twitch-eventsub-channel-subscription-message', {
    category: 'twitch events',
    color: '#b9a3e3',
    defaults: {
      name:   { value: "" },
      config: { value: "", type: "twitch-api-config", required: true }
    },
    inputs: 0,
    outputs: 1,
    icon: 'twitch-icon.svg',
    paletteLabel: "subscription message",
    label: function() {
      return this.name || 'subscription message';
    },
    labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
  });
</script>

<script type="text/html" data-template-name="twitch-eventsub-channel-subscription-message">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config">
  </div>
</script>

<script type="text/html" data-help-name="twitch-eventsub-channel-subscription-message">
  <h2>Twitch Subscription Message</h2>
  <p>Triggers when a user manually publishes their resubscription milestone anniversary to live chat.</p>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload.messageText <span class="property-type">string</span></dt>
    <dd>The custom chat message written by the user.</dd>
    <dt>payload.cumulativeMonths <span class="property-type">number</span></dt>
    <dd>Total lifetime months subscribed.</dd>
    <dt>payload.streakMonths <span class="property-type">number | null</span></dt>
    <dd>Consecutive months subscribed without a lapse.</dd>
  </dl>
</script>
