<script type="text/javascript">
  RED.nodes.registerType('twitch-eventsub-channel-shoutout-receive', {
    category: 'twitch events',
    color: '#b9a3e3',
    defaults: { name: { value: '' }, config: { type: 'twitch-api-config', required: true } },
    inputs: 0, outputs: 1, icon: 'twitch-icon.svg',
    paletteLabel: 'shoutout receive',
    label: function () {
      if (this.name) return this.name;
      const config = RED.nodes.node(this.config);
      return 'shoutout receive' + (config ? ' (' + (config.name || '') + ')' : '');
    },
    labelStyle: function () { return this.name ? 'node_label_italic' : ''; },
  });
</script>
<script type="text/html" data-template-name="twitch-eventsub-channel-shoutout-receive">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config" />
  </div>
</script>
<script type="text/html" data-help-name="twitch-eventsub-channel-shoutout-receive">
  <p>Triggers when the channel receives a shoutout from another broadcaster.</p>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload.broadcasterId <span class="property-type">string</span></dt><dd>ID of this channel's broadcaster.</dd>
    <dt>payload.sendingBroadcasterId <span class="property-type">string</span></dt><dd>ID of the broadcaster who sent the shoutout.</dd>
    <dt>payload.sendingBroadcasterName <span class="property-type">string</span></dt><dd>Login name of the sending broadcaster.</dd>
    <dt>payload.sendingBroadcasterDisplayName <span class="property-type">string</span></dt><dd>Display name of the sending broadcaster.</dd>
    <dt>payload.viewerCount <span class="property-type">number</span></dt><dd>Number of viewers at the time of the shoutout.</dd>
    <dt>payload.startDate <span class="property-type">Date</span></dt><dd>When the shoutout occurred.</dd>
    <dt>payload.rawEvent <span class="property-type">object</span></dt><dd>Complete raw event from Twitch.</dd>
  </dl>
</script>
