<script type="text/javascript">
  RED.nodes.registerType('twitch-eventsub-channel-subscription', {
    category: 'twitch events',
    color: '#b9a3e3',
    defaults: {
      name:   { value: "" },
      config: { value: "", type: "twitch-api-config", required: true }
    },
    inputs: 0,
    outputs: 1,
    icon: 'twitch-icon.svg',
    paletteLabel: "subscription",
    label: function() {
      return this.name || 'subscription';
    },
    labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
  });
</script>

<script type="text/html" data-template-name="twitch-eventsub-channel-subscription">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config">
  </div>
</script>

<script type="text/html" data-help-name="twitch-eventsub-channel-subscription">
  <h2>Twitch Channel Subscription</h2>
  <p>Triggers instantly when a financial subscription transaction occurs (New Sub, Gift Sub, or Silent Auto-Renewal).</p>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload.userDisplayName <span class="property-type">string</span></dt>
    <dd>The display name of the subscriber.</dd>
    <dt>payload.tier <span class="property-type">string</span></dt>
    <dd><code>1000</code>, <code>2000</code>, or <code>3000</code>.</dd>
    <dt>payload.isGift <span class="property-type">boolean</span></dt>
    <dd>True if this subscription was purchased by someone else.</dd>
  </dl>
</script>
